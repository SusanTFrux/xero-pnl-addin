<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connecting to Xero…</title>
  <!--
    auth-dialog.html
    ================
    This page is opened in a popup window by the Office Dialog API.
    
    Two things happen here:
    
    1. If there's no "code" in the URL (first time the dialog opens):
       The page shows "Connecting to Xero…" briefly.
       (The redirect to Xero's login page is actually handled by the add-in —
        it opens Xero's auth URL directly as the dialog URL via the SDK.)
    
    2. After the user logs in, Xero redirects back to THIS page with
       ?code=...&state=... in the URL.
       We detect the code and send it back to the task pane using
       Office.context.ui.messageParent().
  -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #f3f2f1; color: #323130; text-align: center; padding: 20px;
    }
    .box {
      background: white; border-radius: 8px; padding: 32px 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1); max-width: 380px; width: 100%;
    }
    .logo { font-size: 32px; margin-bottom: 12px; }
    h1 { font-size: 18px; font-weight: 600; color: #1B3A5C; margin-bottom: 8px; }
    p  { font-size: 13px; color: #605e5c; line-height: 1.5; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #edebe9;
      border-top-color: #1ab394; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ok   { color: #107c10; font-size: 24px; }
    .err  { color: #a4262c; font-size: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo" id="icon">🔐</div>
    <h1 id="title">Connecting to Xero…</h1>
    <div class="spinner" id="spinner"></div>
    <p id="message">Please wait while we complete the login.</p>
  </div>

  <script>
    /*
      This script runs as soon as the page loads.
      It checks whether Xero has sent us a callback (by looking for
      "code" or "error" in the URL query string).
    */

    // Parse the URL query parameters
    // e.g. ?code=abc123&state=xyz → { code: "abc123", state: "xyz" }
    const params = new URLSearchParams(window.location.search);
    const code   = params.get("code");
    const state  = params.get("state");
    const error  = params.get("error");
    const desc   = params.get("error_description");

    function showOk(msg) {
      document.getElementById("icon").textContent    = "✅";
      document.getElementById("title").textContent   = "Authorised!";
      document.getElementById("spinner").style.display = "none";
      document.getElementById("message").textContent = msg;
    }

    function showErr(msg) {
      document.getElementById("icon").textContent    = "❌";
      document.getElementById("title").textContent   = "Login failed";
      document.getElementById("spinner").style.display = "none";
      document.getElementById("message").textContent = msg;
    }

    /*
      Office.onReady must complete before we can call Office.context.ui.messageParent().
      messageParent() sends a message string back to the task pane that opened this dialog.
    */
    Office.onReady(function() {

      if (error) {
        // Xero returned an error (e.g. user clicked "Deny")
        showErr(desc || error);
        Office.context.ui.messageParent(JSON.stringify({
          type: "error",
          message: desc || error
        }));

      } else if (code) {
        // Success — Xero gave us the auth code
        showOk("You can return to Excel now.");
        /*
          Send the code and state back to taskpane.js.
          The task pane will exchange this code for an access token
          via our Netlify serverless function.
        */
        Office.context.ui.messageParent(JSON.stringify({
          type:  "code",
          code:  code,
          state: state
        }));

      } else {
        // This page was opened without a code — shouldn't happen normally
        // The add-in opens Xero's auth URL directly as the dialog URL
        showErr("Unexpected page state. Please try connecting again.");
        Office.context.ui.messageParent(JSON.stringify({
          type: "error",
          message: "Auth dialog loaded without code or error."
        }));
      }
    });
  </script>
</body>
</html>
