# netlify.toml
# =============
# Tells Netlify how to build and serve the add-in.
# The [functions] section tells Netlify where our serverless functions live.

[build]
  publish = "."           # serve files from the root folder
  functions = "netlify/functions"  # serverless functions are in this folder

[build.environment]
  NODE_VERSION = "18"     # use Node.js 18 for the serverless functions

# Headers for all pages — required for Office add-ins to load in Excel
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "ALLOWALL"   # Excel loads the add-in in an iframe
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:"

# Redirect for the functions path (makes URLs cleaner)
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200
